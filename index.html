<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0a;
  color: #fff;
  font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
  padding: 16px;
  min-height: 100vh;
}
.header {
  text-align: center;
  padding: 36px 20px 28px;
  border-bottom: 1px solid #222;
  margin-bottom: 24px;
}
.header h1 {
  font-size: 26px;
  letter-spacing: 5px;
  margin-bottom: 8px;
  font-weight: 800;
  text-transform: uppercase;
}
.header p {
  color: #777;
  font-size: 13px;
  letter-spacing: 1px;
}
.stats-bar {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 8px 24px;
  margin-bottom: 20px;
  font-size: 13px;
  color: #999;
}
.stats-bar .stat-item { display: flex; align-items: center; gap: 5px; }
.stats-bar .dot {
  width: 8px; height: 8px; border-radius: 50%; display: inline-block;
}
.dot-total { background: #555; }
.dot-yes { background: #4CAF50; }
.dot-no { background: #f44336; }
.dot-pending { background: #ff9800; }

/* 카테고리 필터 */
.filter-bar {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 28px;
  padding: 0 10px;
}
.filter-btn {
  padding: 7px 18px;
  border: 1px solid #333;
  border-radius: 20px;
  background: transparent;
  color: #999;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
  font-weight: 500;
}
.filter-btn:hover { border-color: #666; color: #fff; }
.filter-btn.active {
  background: #fff;
  color: #000;
  border-color: #fff;
  font-weight: 700;
}
.filter-btn .count {
  font-size: 10px;
  opacity: 0.6;
  margin-left: 3px;
}

/* 그리드 */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
  max-width: 1440px;
  margin: 0 auto;
}
@media (min-width: 1200px) {
  .grid { grid-template-columns: repeat(4, 1fr); }
}
@media (max-width: 640px) {
  .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .card-img, .card-img-placeholder { height: 180px !important; }
  .card-body { padding: 10px !important; }
  .card-body h3 { font-size: 11px !important; }
  .btns button { padding: 7px !important; font-size: 13px !important; }
  .header h1 { font-size: 18px; }
}
@media (max-width: 380px) {
  .grid { grid-template-columns: 1fr; }
}

/* 카드 */
.card {
  background: #141414;
  border-radius: 10px;
  overflow: hidden;
  border: 2px solid #222;
  transition: all 0.25s;
  position: relative;
}
.card:hover { border-color: #444; transform: translateY(-2px); }
.card.selected-yes { border-color: #4CAF50; }
.card.selected-no { border-color: #f44336; opacity: 0.35; }
.card.selected-no:hover { opacity: 0.6; }
.card-number {
  position: absolute;
  top: 10px;
  left: 10px;
  background: rgba(0,0,0,0.7);
  color: #aaa;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  z-index: 2;
  backdrop-filter: blur(4px);
}
.card-img {
  width: 100%;
  height: 240px;
  object-fit: contain;
  background: #f5f5f5;
  display: block;
  padding: 10px;
}
.card-img-placeholder {
  width: 100%;
  height: 240px;
  background: linear-gradient(135deg, #1a1a1a, #111);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #444;
  font-size: 12px;
  text-align: center;
  padding: 20px;
}
.card-body {
  padding: 14px;
}
.card-body h3 {
  font-size: 12px;
  margin-bottom: 8px;
  font-weight: 600;
  line-height: 1.4;
  color: #e0e0e0;
}
.badge {
  display: inline-block;
  padding: 2px 7px;
  border-radius: 3px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.5px;
  vertical-align: middle;
  margin-left: 4px;
}
.badge-highend { background: #2d1b4e; color: #c084fc; }
.badge-luxury { background: #2a1f3d; color: #a78bfa; }
.badge-street { background: #1a2740; color: #60a5fa; }
.badge-tactical { background: #1a3320; color: #86efac; }
.badge-minimal { background: #2a2a1f; color: #fde68a; }
.badge-classic { background: #3d1f2a; color: #f472b6; }
.badge-gothic { background: #1f1a2e; color: #b794f4; }
.badge-aqua { background: #0e2a33; color: #67e8f9; }

.btns {
  display: flex;
  gap: 8px;
}
.btns button {
  flex: 1;
  padding: 9px;
  border: none;
  border-radius: 6px;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-yes {
  background: #122b12;
  color: #4CAF50;
}
.btn-yes:hover, .btn-yes.active {
  background: #4CAF50;
  color: #fff;
}
.btn-no {
  background: #2b1212;
  color: #f44336;
}
.btn-no:hover, .btn-no.active {
  background: #f44336;
  color: #fff;
}

/* 하단 */
.export-section {
  text-align: center;
  margin: 40px auto;
  max-width: 900px;
}
.export-btn {
  background: #fff;
  color: #000;
  border: none;
  padding: 13px 36px;
  font-size: 14px;
  font-weight: bold;
  border-radius: 8px;
  cursor: pointer;
  letter-spacing: 2px;
  margin: 8px;
  transition: background 0.2s;
}
.export-btn:hover { background: #e0e0e0; }
.export-btn.secondary {
  background: transparent;
  color: #666;
  border: 1px solid #333;
}
.export-btn.secondary:hover { border-color: #666; color: #aaa; }
.result-area {
  display: none;
  margin-top: 30px;
  background: #141414;
  border-radius: 12px;
  padding: 28px;
  text-align: left;
  border: 1px solid #222;
}
.result-area h2 {
  margin-bottom: 20px;
  font-size: 16px;
  color: #ccc;
}
.result-area .result-grid {

  gap: 12px;
}
.result-card {
  background: #1a1a1a;
  border-radius: 8px;
  padding: 12px;
  border-left: 3px solid #4CAF50;
}
.result-card h4 { font-size: 12px; margin-bottom: 4px; }
.result-card p { font-size: 11px; color: #888; }
.copy-text {
  margin-top: 20px;
  background: #0d0d0d;
  padding: 20px;
  border-radius: 8px;
  font-size: 12px;
  line-height: 1.8;
  white-space: pre-wrap;
  color: #bbb;
  border: 1px solid #1a1a1a;
}
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #4CAF50;
  color: #fff;
  padding: 12px 28px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  transition: transform 0.3s ease;
  z-index: 999;
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }
</style>

const STORAGE_KEY = 'coa-blackcombat-selections';
const categories = [
  { key:'all', label:'전체' },
  { key:'highend', label:'하이엔드' },
  { key:'street', label:'스트릿' },
  { key:'tactical', label:'택티컬' },
  { key:'luxury', label:'럭셔리' },
  { key:'minimal', label:'미니멀' },
  { key:'classic', label:'클래식' },
  { key:'gothic', label:'고딕' },
  { key:'aqua', label:'아쿠아' }
];

let state = loadState();
let activeFilter = 'all';

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    return saved ? JSON.parse(saved) : {};
  } catch(e) { return {}; }
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function getFiltered() {
  if (activeFilter === 'all') return designs;
  return designs.filter(d => d.cat === activeFilter);
}

function renderFilters() {
  const bar = document.getElementById('filterBar');
  bar.innerHTML = '';
  categories.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (activeFilter === c.key ? ' active' : '');
    const count = c.key === 'all' ? designs.length : designs.filter(d => d.cat === c.key).length;
    btn.innerHTML = `${c.label} <span class="count">${count}</span>`;
    btn.onclick = () => { activeFilter = c.key; renderFilters(); renderCards(); };
    bar.appendChild(btn);
  });
}

function renderCards() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const filtered = getFiltered();
  filtered.forEach(d => {
    const sel = state[d.id];
    const card = document.createElement('div');
    card.className = 'card' + (sel === 'yes' ? ' selected-yes' : sel === 'no' ? ' selected-no' : '');

    const imgHtml = d.img
      ? `<img class="card-img" src="${d.img}" alt="${d.name}" loading="lazy" onerror="this.outerHTML='<div class=\\'card-img-placeholder\\'>이미지 로드 실패</div>'">`
      : `<div class="card-img-placeholder">이미지 없음</div>`;

    card.innerHTML = `
      <div class="card-number">${d.id}</div>
      ${imgHtml}
      <div class="card-body">
        <h3>${d.name} <span class="badge badge-${d.cat}">${d.catLabel}</span></h3>
        <div class="btns">
          <button class="btn-yes ${sel==='yes'?'active':''}" onclick="select(${d.id},'yes')">O</button>
          <button class="btn-no ${sel==='no'?'active':''}" onclick="select(${d.id},'no')">X</button>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
  updateStats();
}

function select(id, choice) {
  state[id] = state[id] === choice ? null : choice;
  if (state[id] === null) delete state[id];
  saveState();
  renderCards();
}

function updateStats() {
  const yes = Object.values(state).filter(v => v === 'yes').length;
  const no = Object.values(state).filter(v => v === 'no').length;
  document.getElementById('total').textContent = designs.length;
  document.getElementById('yesCount').textContent = yes;
  document.getElementById('noCount').textContent = no;
  document.getElementById('pendingCount').textContent = designs.length - yes - no;
}

function resetAll() {
  if (!confirm('모든 선택을 초기화할까요?')) return;
  state = {};
  saveState();
  renderCards();
  document.getElementById('resultArea').style.display = 'none';
  showToast('초기화 완료');
}

function showResult() {
  const selected = designs.filter(d => state[d.id] === 'yes');
  if (selected.length === 0) {
    alert('O로 선택된 디자인이 없습니다.');
    return;
  }
  const resultArea = document.getElementById('resultArea');
  const resultGrid = document.getElementById('resultGrid');
  const copyText = document.getElementById('copyText');

  resultGrid.innerHTML = '';
  selected.forEach(d => {
    const card = document.createElement('div');
    card.className = 'result-card';
    card.innerHTML = `<h4>#${d.id} ${d.name}</h4><p>${d.catLabel}</p>`;
    resultGrid.appendChild(card);
  });

  let text = `COA x BLACK COMBAT 콜라보 여름 슬리퍼\n`;
  text += `제작 가능 디자인 셀렉션 (${selected.length}개)\n`;
  text += `${'─'.repeat(40)}\n\n`;
  selected.forEach((d, i) => {
    text += `${i+1}. #${d.id} ${d.name} [${d.catLabel}]\n`;
    if (d.img) text += `   이미지: ${d.img}\n`;
    text += `\n`;
  });
  text += `${'─'.repeat(40)}\n`;
  text += `Core of Alchemy (COA) x Black Combat\n`;
  text += `선택일: ${new Date().toLocaleDateString('ko-KR')}`;

  copyText.textContent = text;
  resultArea.style.display = 'block';
  resultArea.scrollIntoView({ behavior: 'smooth' });
}

function copyToClipboard() {
  const text = document.getElementById('copyText').textContent;
  navigator.clipboard.writeText(text).then(() => {
    showToast('클립보드에 복사 완료');
  });
}

renderFilters();
renderCards();
</script>
