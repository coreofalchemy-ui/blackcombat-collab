<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COA x BLACK COMBAT 콜라보 여름 슬리퍼 디자인 셀렉션</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0a;
  color: #fff;
  font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
  padding: 16px;
  min-height: 100vh;
}
.header {
  text-align: center;
  padding: 36px 20px 28px;
  border-bottom: 1px solid #222;
  margin-bottom: 24px;
}
.header h1 {
  font-size: 26px;
  letter-spacing: 5px;
  margin-bottom: 8px;
  font-weight: 800;
  text-transform: uppercase;
}
.header p {
  color: #777;
  font-size: 13px;
  letter-spacing: 1px;
}
.stats-bar {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 8px 24px;
  margin-bottom: 20px;
  font-size: 13px;
  color: #999;
}
.stats-bar .stat-item { display: flex; align-items: center; gap: 5px; }
.stats-bar .dot {
  width: 8px; height: 8px; border-radius: 50%; display: inline-block;
}
.dot-total { background: #555; }
.dot-yes { background: #4CAF50; }
.dot-no { background: #f44336; }
.dot-pending { background: #ff9800; }

/* 섹션 토글 */
.section-bar {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 12px;
  padding: 0 10px;
}
.section-btn {
  padding: 7px 20px;
  border: 1px solid #444;
  border-radius: 20px;
  background: transparent;
  color: #aaa;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
  font-weight: 600;
  letter-spacing: 0.5px;
}
.section-btn:hover { border-color: #888; color: #fff; }
.section-btn.active {
  background: #fbbf24;
  color: #000;
  border-color: #fbbf24;
  font-weight: 800;
}

/* 카테고리 필터 */
.filter-bar {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 28px;
  padding: 0 10px;
}
.filter-btn {
  padding: 7px 18px;
  border: 1px solid #333;
  border-radius: 20px;
  background: transparent;
  color: #999;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
  font-weight: 500;
}
.filter-btn:hover { border-color: #666; color: #fff; }
.filter-btn.active {
  background: #fff;
  color: #000;
  border-color: #fff;
  font-weight: 700;
}
.filter-btn .count {
  font-size: 10px;
  opacity: 0.6;
  margin-left: 3px;
}

/* 생성기 존 */
.generator-zone {
  max-width: 900px;
  margin: 0 auto 24px;
  background: #141414;
  border: 1px solid #2a2a2a;
  border-radius: 12px;
  padding: 20px;
}
.drop-area {
  border: 2px dashed #333;
  border-radius: 8px;
  padding: 28px 20px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.2s;
  margin-bottom: 16px;
  min-height: 240px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.drop-area:hover { border-color: #10b981; }
.drop-area.drag-over { border-color: #10b981; background: rgba(16, 185, 129, 0.05); }
.drop-hint {
  color: #888;
  font-size: 17px;
  pointer-events: none;
  line-height: 1.6;
}
.drop-hint .drop-icon {
  font-size: 44px;
  display: block;
  margin-bottom: 10px;
}
.drop-previews {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 12px;
  justify-content: center;
}
.drop-preview-item {
  position: relative;
  width: 64px;
  height: 64px;
}
.drop-preview-item img {
  width: 64px;
  height: 64px;
  object-fit: cover;
  border-radius: 6px;
  border: 1px solid #333;
}
.drop-preview-item .remove-btn {
  position: absolute;
  top: -6px;
  right: -6px;
  width: 18px;
  height: 18px;
  background: #f44336;
  border: none;
  border-radius: 50%;
  color: #fff;
  font-size: 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  line-height: 1;
}
.gen-controls {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.gen-label {
  font-size: 12px;
  color: #888;
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.gen-label input[type="text"] {
  background: #0d0d0d;
  border: 1px solid #333;
  border-radius: 6px;
  padding: 8px 12px;
  color: #fff;
  font-size: 12px;
  outline: none;
  transition: border-color 0.2s;
}
.gen-label input[type="text"]:focus { border-color: #555; }
.gen-btn {
  background: #fff;
  color: #000;
  border: none;
  padding: 11px 28px;
  font-size: 13px;
  font-weight: bold;
  border-radius: 8px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: background 0.2s;
  align-self: flex-start;
}
.gen-btn:hover:not(:disabled) { background: #e0e0e0; }
.gen-btn:disabled {
  background: #2a2a2a;
  color: #555;
  cursor: not-allowed;
}
.gen-status {
  font-size: 12px;
  color: #888;
  min-height: 18px;
}
.gen-status.loading { color: #fbbf24; }
.gen-status.success { color: #4CAF50; }
.gen-status.error { color: #f44336; }

/* 그리드 */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
  max-width: 1440px;
  margin: 0 auto;
}
@media (min-width: 1200px) {
  .grid { grid-template-columns: repeat(4, 1fr); }
}
@media (max-width: 640px) {
  .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .card-img, .card-img-placeholder { height: 180px !important; }
  .card-body { padding: 10px !important; }
  .card-body h3 { font-size: 11px !important; }
  .btns button { padding: 7px !important; font-size: 13px !important; }
  .header h1 { font-size: 18px; }
}
@media (max-width: 380px) {
  .grid { grid-template-columns: 1fr; }
}

/* 카드 */
.card {
  background: #141414;
  border-radius: 10px;
  overflow: hidden;
  border: 2px solid #222;
  transition: all 0.25s;
  position: relative;
}
.card:hover { border-color: #444; transform: translateY(-2px); }
.card.selected-yes { border-color: #4CAF50; }
.card.selected-no { border-color: #f44336; opacity: 0.35; }
.card.selected-no:hover { opacity: 0.6; }
.card.generated-card { border-color: #fbbf24; }
.card-number {
  position: absolute;
  top: 10px;
  left: 10px;
  background: rgba(0,0,0,0.7);
  color: #aaa;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  z-index: 2;
  backdrop-filter: blur(4px);
}
.card-img {
  width: 100%;
  height: 240px;
  object-fit: contain;
  background: #f5f5f5;
  display: block;
  padding: 10px;
}
.card-img-placeholder {
  width: 100%;
  height: 240px;
  background: linear-gradient(135deg, #1a1a1a, #111);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #444;
  font-size: 12px;
  text-align: center;
  padding: 20px;
}
.card-body {
  padding: 14px;
}
.card-body h3 {
  font-size: 12px;
  margin-bottom: 8px;
  font-weight: 600;
  line-height: 1.4;
  color: #e0e0e0;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
}
.card-body h3 .h3-text { flex: 1; min-width: 0; word-break: keep-all; }
.zoom-btn {
  flex-shrink: 0;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  color: #ddd;
  width: 30px;
  height: 30px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  padding: 0;
}
.zoom-btn:hover, .zoom-btn:active {
  background: rgba(255,255,255,0.2);
  border-color: rgba(255,255,255,0.3);
  color: #fff;
  transform: scale(1.08);
}
@media (max-width: 640px) {
  .zoom-btn { width: 34px; height: 34px; font-size: 16px; }
}
.badge {
  display: inline-block;
  padding: 2px 7px;
  border-radius: 3px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.5px;
  vertical-align: middle;
  margin-left: 4px;
}
.badge-highend { background: #2d1b4e; color: #c084fc; }
.badge-luxury { background: #2a1f3d; color: #a78bfa; }
.badge-street { background: #1a2740; color: #60a5fa; }
.badge-tactical { background: #1a3320; color: #86efac; }
.badge-minimal { background: #2a2a1f; color: #fde68a; }
.badge-classic { background: #3d1f2a; color: #f472b6; }
.badge-gothic { background: #1f1a2e; color: #b794f4; }
.badge-aqua { background: #0e2a33; color: #67e8f9; }
.badge-coa { background: #2a1f0e; color: #fbbf24; }
.badge-generated { background: #0e2a1f; color: #00ff9d; }
.card.generated-card { border-color: #00ff9d !important; box-shadow: 0 0 8px rgba(0, 255, 157, 0.25); }

.btns {
  display: flex;
  gap: 8px;
}
.btns button {
  flex: 1;
  padding: 9px;
  border: none;
  border-radius: 6px;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-yes {
  background: #122b12;
  color: #4CAF50;
}
.btn-yes:hover, .btn-yes.active {
  background: #4CAF50;
  color: #fff;
}
.btn-no {
  background: #2b1212;
  color: #f44336;
}
.btn-no:hover, .btn-no.active {
  background: #f44336;
  color: #fff;
}

/* 하단 */
.export-section {
  text-align: center;
  margin: 40px auto;
  max-width: 900px;
}
.export-btn {
  background: #fff;
  color: #000;
  border: none;
  padding: 13px 36px;
  font-size: 14px;
  font-weight: bold;
  border-radius: 8px;
  cursor: pointer;
  letter-spacing: 2px;
  margin: 8px;
  transition: background 0.2s;
}
.export-btn:hover { background: #e0e0e0; }
.export-btn.secondary {
  background: transparent;
  color: #666;
  border: 1px solid #333;
}
.export-btn.secondary:hover { border-color: #666; color: #aaa; }
.result-area {
  display: none;
  margin-top: 30px;
  background: #141414;
  border-radius: 12px;
  padding: 28px;
  text-align: left;
  border: 1px solid #222;
}
.result-area h2 {
  margin-bottom: 20px;
  font-size: 16px;
  color: #ccc;
}
.result-area .result-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
}
.result-card {
  background: #1a1a1a;
  border-radius: 8px;
  padding: 12px;
  border-left: 3px solid #4CAF50;
}
.result-card h4 { font-size: 12px; margin-bottom: 4px; }
.result-card p { font-size: 11px; color: #888; }
.copy-text {
  margin-top: 20px;
  background: #0d0d0d;
  padding: 20px;
  border-radius: 8px;
  font-size: 12px;
  line-height: 1.8;
  white-space: pre-wrap;
  color: #bbb;
  border: 1px solid #1a1a1a;
}
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #4CAF50;
  color: #fff;
  padding: 12px 28px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  transition: transform 0.3s ease;
  z-index: 999;
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* 라이트박스 모달 */
.lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.92);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(8px);
}
.lightbox.show { display: flex; }
.lightbox-inner {
  position: relative;
  max-width: 95vw;
  max-height: 92vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}
.lightbox-img {
  max-width: 95vw;
  max-height: 75vh;
  object-fit: contain;
  border-radius: 8px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  background: #fff;
}
.lightbox-meta {
  color: #eee;
  font-size: 14px;
  text-align: center;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
}
.lightbox-meta .lb-num {
  background: rgba(255,255,255,0.1);
  color: #bbb;
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 700;
}
.lightbox-btns {
  display: flex;
  gap: 12px;
}
.lightbox-btns button {
  padding: 12px 36px;
  border-radius: 8px;
  border: none;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.15s;
  min-width: 120px;
}
.lb-btn-yes { background: #4CAF50; color: #fff; }
.lb-btn-yes.active { background: #2e7d32; box-shadow: 0 0 0 3px rgba(76,175,80,0.4); }
.lb-btn-no { background: #f44336; color: #fff; }
.lb-btn-no.active { background: #c62828; box-shadow: 0 0 0 3px rgba(244,67,54,0.4); }
.lb-close, .lb-prev, .lb-next {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  color: #fff;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.lb-close { top: 20px; right: 20px; transform: none; }
.lb-prev { left: 24px; }
.lb-next { right: 24px; }
.lb-close:hover, .lb-prev:hover, .lb-next:hover { background: rgba(255,255,255,0.18); }
</style>
</head>
<body>

<div class="header">
  <h1>COA x BLACK COMBAT</h1>
  <p>콜라보 여름 슬리퍼 디자인 셀렉션</p>
</div>

<!-- 이미지 드롭존 + 디자인 생성 -->
<div class="generator-zone">
  <div class="drop-area" id="dropArea">
    <div class="drop-hint"><span class="drop-icon">📁</span>레퍼런스 이미지를 여기에 드롭 · 또는 클릭해서 파일 선택 (1~4장)</div>
    <input type="file" id="fileInput" accept="image/*" multiple style="display:none">
    <div class="drop-previews" id="dropPreviews"></div>
  </div>
  <div class="gen-controls">
    <label class="gen-label">
      프롬프트 힌트 (선택):
      <input type="text" id="genHint" placeholder="예: 플립플랍 스타일, 블랙 가죽, 미니멀" />
    </label>
    <button class="gen-btn" id="genBtn" disabled>🎨 디자인 생성 (GPT-Image-2)</button>
    <div class="gen-status" id="genStatus"></div>
  </div>
</div>

<div class="stats-bar">
  <div class="stat-item"><span class="dot dot-total"></span> 전체 <strong id="total">0</strong></div>
  <div class="stat-item"><span class="dot dot-yes"></span> O <strong id="yesCount">0</strong></div>
  <div class="stat-item"><span class="dot dot-no"></span> X <strong id="noCount">0</strong></div>
  <div class="stat-item"><span class="dot dot-pending"></span> 미선택 <strong id="pendingCount">0</strong></div>
</div>

<!-- 섹션 토글 -->
<div class="section-bar" id="sectionBar"></div>

<!-- 카테고리 필터 -->
<div class="filter-bar" id="filterBar"></div>

<div class="grid" id="grid"></div>

<div class="export-section">
  <button class="export-btn" onclick="showResult()">선택 완료 - 결과 보기</button>
  <button class="export-btn secondary" onclick="resetAll()">전체 초기화</button>
  <div class="result-area" id="resultArea">
    <h2>COA x BLACK COMBAT 콜라보 슬리퍼 - 제작 가능 디자인</h2>
    <div class="result-grid" id="resultGrid"></div>
    <div class="copy-text" id="copyText"></div>
    <button class="export-btn" style="margin-top:20px" onclick="copyToClipboard()">텍스트 복사</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- 라이트박스 모달 -->
<div class="lightbox" id="lightbox">
  <button class="lb-prev" id="lbPrev" title="이전 (←)">◀</button>
  <button class="lb-next" id="lbNext" title="다음 (→)">▶</button>
  <button class="lb-close" id="lbClose" title="닫기 (ESC)">✕</button>
  <div class="lightbox-inner">
    <img class="lightbox-img" id="lbImg" src="" alt="">
    <div class="lightbox-meta" id="lbMeta"></div>
    <div class="lightbox-btns">
      <button class="lb-btn-yes" id="lbYes">O  선택</button>
      <button class="lb-btn-no" id="lbNo">X  제외</button>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// 1. 스크래핑 데이터 (186개, 절대 수정 금지)
// ─────────────────────────────────────────────

// 2. CoA 디자인 (101개, designs/ 폴더 로컬 파일)
// ─────────────────────────────────────────────
const coaDesigns = Array.from({length: 101}, function(_, i) {
  var n = i + 1;
  var pad = String(n).padStart(3, '0');
  return {
    id: 1000 + n,
    name: 'CoA Concept #' + pad,
    img: 'designs/design_' + pad + '.png',
    cat: 'coa',
    catLabel: 'CoA 디자인',
    source: 'coa',
    generated: false
  };
});

// ─────────────────────────────────────────────
// 3. 상태 관리
// ─────────────────────────────────────────────
const STORAGE_KEY = 'bc-selections-v2';

var state = loadState();
var activeSection = 'all'; // 'all' | 'scraped' | 'coa' | 'generated'
var activeFilter = 'all';
var generatedCount = 0;

// 생성된 카드 저장소 (localStorage 복원 포함)
var generatedDesigns = loadGeneratedDesigns();

function loadState() {
  try {
    var saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      var parsed = JSON.parse(saved);
      // v1 호환: 구형 포맷(단순 객체)도 수용
      if (parsed && typeof parsed === 'object' && !Array.isArray(parsed) && !parsed.yes) {
        return { yes: [], no: [], selections: parsed };
      }
      if (parsed && parsed.selections) return parsed;
      return { yes: [], no: [], selections: parsed };
    }
  } catch(e) {}
  return { yes: [], no: [], selections: {} };
}

function getSelections() {
  return state.selections || state;
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ yes: state.yes || [], no: state.no || [], selections: getSelections() }));
  } catch(e) {}
}

function loadGeneratedDesigns() {
  try {
    var saved = localStorage.getItem(STORAGE_KEY + '-generated');
    return saved ? JSON.parse(saved) : [];
  } catch(e) { return []; }
}

function saveGeneratedDesigns() {
  try {
    localStorage.setItem(STORAGE_KEY + '-generated', JSON.stringify(generatedDesigns));
  } catch(e) {}
}

// ─────────────────────────────────────────────
// 4. allDesigns 머지
// ─────────────────────────────────────────────
function getAllDesigns() {
  return generatedDesigns.concat(coaDesigns).concat(designs);
}

  { key:'tactical', label:'택티컬' },
  { key:'luxury', label:'럭셔리' },
  { key:'minimal', label:'미니멀' },
  { key:'classic', label:'클래식' },
  { key:'gothic', label:'고딕' },
  { key:'aqua', label:'아쿠아' },
  { key:'coa', label:'CoA 디자인' }
];

function getFiltered() {
  var designsToRender;
  if (activeSection === 'yes') {
    // 선택(O)한 것만 — 전체 풀에서 sel === 'yes'
    var selYes = getSelections();
    var allPool = generatedDesigns.concat(coaDesigns).concat(designs);
    designsToRender = allPool.filter(function(d) { return selYes[d.id] === 'yes'; });
  } else if (activeSection === 'generated') {
    designsToRender = generatedDesigns;
  } else if (activeSection === 'coa') {
    designsToRender = coaDesigns; // generated 제외
  } else if (activeSection === 'scraped') {
    designsToRender = designs; // 186개
  } else {
    designsToRender = generatedDesigns.concat(coaDesigns).concat(designs); // 생성된 것 맨 앞
  }
  // 카테고리 필터
  if (activeFilter === 'all') return designsToRender;
  return designsToRender.filter(function(d) { return d.cat === activeFilter; });
}

function renderSections() {
  var bar = document.getElementById('sectionBar');
  bar.innerHTML = '';
  var scraped = designs.length;
  var coa = coaDesigns.length;
  var gen = generatedDesigns.length;
  var selSec = getSelections();
  var yesN = Object.values(selSec).filter(function(v) { return v === 'yes'; }).length;
  var sections = [
    { key:'all', label:'전체', count: scraped + coa + gen },
    { key:'scraped', label:'스크래핑 ' + scraped, count: null },
    { key:'coa', label:'CoA 디자인 ' + coa, count: null },
    { key:'generated', label:'🎨 생성된 디자인', count: gen, neon: true },
    { key:'yes', label:'⭐ 내가 선택 (O)', count: yesN, yes: true }
  ];
  sections.forEach(function(s) {
    var btn = document.createElement('button');
    btn.className = 'section-btn' + (activeSection === s.key ? ' active' : '');
    if (s.neon && activeSection !== s.key) {
      btn.style.borderColor = '#00ff9d';
      btn.style.color = '#00ff9d';
    }
    if (s.yes && activeSection !== s.key) {
      btn.style.borderColor = '#4CAF50';
      btn.style.color = '#4CAF50';
    }
    if (s.yes && activeSection === s.key) {
      btn.style.background = '#4CAF50';
      btn.style.borderColor = '#4CAF50';
      btn.style.color = '#fff';
    }
    var label = s.count !== null ? s.label + ' <span class="count">(' + s.count + ')</span>' : s.label;
    btn.innerHTML = label;
    btn.onclick = function() {
      activeSection = s.key;
      activeFilter = 'all';
      renderSections();
      renderFilters();
      renderCards();
    };
    bar.appendChild(btn);
  });
}

function renderFilters() {
  var bar = document.getElementById('filterBar');
  bar.innerHTML = '';
  var sectionPool;
  if (activeSection === 'generated') {
    sectionPool = generatedDesigns;
  } else if (activeSection === 'coa') {
    sectionPool = coaDesigns;
  } else if (activeSection === 'scraped') {
    sectionPool = designs;
  } else {
    sectionPool = getAllDesigns();
  }
  categories.forEach(function(c) {
    // CoA 카테고리는 CoA 섹션 또는 전체 섹션에서만 표시
    if (c.key === 'coa' && activeSection === 'scraped') return;
    // 스크래핑 카테고리는 스크래핑 섹션 또는 전체 섹션에서만 표시
    var cnt = c.key === 'all' ? sectionPool.length : sectionPool.filter(function(d) { return d.cat === c.key; }).length;
    if (cnt === 0 && c.key !== 'all') return;
    var btn = document.createElement('button');
    btn.className = 'filter-btn' + (activeFilter === c.key ? ' active' : '');
    btn.innerHTML = c.label + ' <span class="count">' + cnt + '</span>';
    btn.onclick = function() { activeFilter = c.key; renderFilters(); renderCards(); };
    bar.appendChild(btn);
  });
}

function renderCards() {
  var grid = document.getElementById('grid');
  grid.innerHTML = '';
  var filtered = getFiltered();
  var sel = getSelections();
  filtered.forEach(function(d) {
    var chosen = sel[d.id];
    var card = document.createElement('div');
    var extraClass = d.generated ? ' generated-card' : '';
    card.className = 'card' + extraClass + (chosen === 'yes' ? ' selected-yes' : chosen === 'no' ? ' selected-no' : '');

    var imgHtml = d.img
      ? '<img class="card-img" src="' + d.img + '" alt="' + escHtml(d.name) + '" loading="lazy" data-fallback="1" data-lightbox-id="' + d.id + '" style="cursor:zoom-in">'
      : '<div class="card-img-placeholder">이미지 없음</div>';

    var generatedBadge = d.generated
      ? ' <span class="badge badge-generated">🎨 AI 생성</span>'
      : '';
    card.innerHTML =
      '<div class="card-number">' + d.id + '</div>' +
      imgHtml +
      '<div class="card-body">' +
        '<h3>' +
          '<span class="h3-text">' + escHtml(d.name) + ' <span class="badge badge-' + d.cat + '">' + d.catLabel + '</span>' + generatedBadge + '</span>' +
          '<button class="zoom-btn" data-zoom-id="' + d.id + '" title="확대">🔍</button>' +
        '</h3>' +
        '<div class="btns">' +
          '<button class="btn-yes ' + (chosen === 'yes' ? 'active' : '') + '" onclick="select(' + d.id + ',\'yes\')">O</button>' +
          '<button class="btn-no ' + (chosen === 'no' ? 'active' : '') + '" onclick="select(' + d.id + ',\'no\')">X</button>' +
        '</div>' +
      '</div>';
    grid.appendChild(card);
  });
  updateStats();
}

function escHtml(str) {
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function select(id, choice) {
  var sel = getSelections();
  sel[id] = sel[id] === choice ? null : choice;
  if (sel[id] === null) delete sel[id];
  saveState();
  renderSections(); // O 카운트 실시간 반영
  renderCards();
}

function updateStats() {
  var sel = getSelections();
  var all = getAllDesigns();
  var yes = Object.values(sel).filter(function(v) { return v === 'yes'; }).length;
  var no = Object.values(sel).filter(function(v) { return v === 'no'; }).length;
  var total = all.length;
  document.getElementById('total').textContent = total;
  document.getElementById('yesCount').textContent = yes;
  document.getElementById('noCount').textContent = no;
  document.getElementById('pendingCount').textContent = total - yes - no;
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2000);
}

function resetAll() {
  if (!confirm('모든 선택을 초기화할까요?')) return;
  state = { yes: [], no: [], selections: {} };
  saveState();
  renderCards();
  document.getElementById('resultArea').style.display = 'none';
  showToast('초기화 완료');
}

var dropArea = document.getElementById('dropArea');
var fileInput = document.getElementById('fileInput');
var genBtn = document.getElementById('genBtn');
var genStatus = document.getElementById('genStatus');

dropArea.addEventListener('click', function(e) {
  if (e.target.classList.contains('remove-btn')) return;
  fileInput.click();
});

dropArea.addEventListener('dragover', function(e) {
  e.preventDefault();
  dropArea.classList.add('drag-over');
});

dropArea.addEventListener('dragleave', function() {
  dropArea.classList.remove('drag-over');
});

dropArea.addEventListener('drop', function(e) {
  e.preventDefault();
  dropArea.classList.remove('drag-over');
  handleFiles(e.dataTransfer.files);
});

fileInput.addEventListener('change', function() {
  handleFiles(fileInput.files);
  fileInput.value = '';
});

function handleFiles(fileList) {
  var remaining = 4 - refImages.length;
  if (remaining <= 0) { alert('최대 4장까지 업로드할 수 있습니다.'); return; }
  var files = Array.from(fileList).slice(0, remaining);
  files.forEach(function(file) {
    var reader = new FileReader();
    reader.onload = function(e) {
      refImages.push(e.target.result);
      renderPreviews();
      updateGenBtn();
    };
    reader.readAsDataURL(file);
  });
}

function renderPreviews() {
  var container = document.getElementById('dropPreviews');
  container.innerHTML = '';
  refImages.forEach(function(dataUrl, idx) {
    var wrap = document.createElement('div');
    wrap.className = 'drop-preview-item';
    var img = document.createElement('img');
    img.src = dataUrl;
    var rmBtn = document.createElement('button');
    rmBtn.className = 'remove-btn';
    rmBtn.textContent = '×';
    rmBtn.onclick = function(e) {
      e.stopPropagation();
      refImages.splice(idx, 1);
      renderPreviews();
      updateGenBtn();
    };
    wrap.appendChild(img);
    wrap.appendChild(rmBtn);
    container.appendChild(wrap);
  });
}

function updateGenBtn() {
  genBtn.disabled = refImages.length === 0;
}

// ─────────────────────────────────────────────
// Vercel 서버리스 함수(/api/submit, /api/status, /api/result) 사용.
// file:// 로컬 테스트 시에는 동일 오리진 api가 없으므로 Vercel 배포 URL 로 고정.
var DEPLOYED_API = 'https://coreofalchemy-ui.github.io'; // 배포 후 Vercel URL로 자동 대체됨
var apiBase = (window.location.protocol === 'https:' || window.location.protocol === 'http:')
  ? '' // 같은 오리진 (Vercel 배포 or localhost:3000 등)
  : DEPLOYED_API; // file:// 일 때만 절대 URL

// 풋베드(footbed, 발이 닿는 상단 안창) 이미지를 페이지 로드 시 미리 base64로 캐시
// — 생성 때마다 자동 참조에 포함하여 "발 닿는 면"의 형태·라인을 고정
var FOOTBED_DATA_URL = null;
(async function preloadFootbed() {
  try {
    var r = await fetch('assets/footbed.png');
    var blob = await r.blob();
    var reader = new FileReader();
    reader.onload = function() { FOOTBED_DATA_URL = reader.result; };
    reader.readAsDataURL(blob);
  } catch (e) {
    // fallback: 로드 실패해도 생성은 진행 (프롬프트로만 보완)
  }
})();

function buildGenerationPrompt(hint, refIndex, totalN) {
  var hintBlock = hint ? [
    'USER DESIGN DIRECTION (MUST be reflected prominently in the output — this is the single most important instruction, overriding any default styling assumptions):',
    hint,
    ''
  ] : [];
  return hintBlock.concat([
    'Create a new photorealistic product concept photograph for the BLACK COMBAT x CoA slipper collaboration.',
    '',
    'Image 1: a design inspiration reference from the user.',
    FOOTBED_DATA_URL ? 'Image 2: the EXACT FOOTBED (the top surface where the foot rests — NOT the outsole, NOT the tread) that must be used on every generated design. Study the outline, the ergonomic foot-shape contour, and the arch/toe/heel cups. Replicate this footbed shape and its black matte finish precisely on the top of the new slipper. Do NOT show Image 2 as a bottom tread — it is the INSOLE / footbed seen from above.' : '',
    '',
    'Composition — MUST MATCH this exact two-view layout (same as the BLACK COMBAT SLIPPER CONCEPT #001~#101 series):',
    '- Pure white studio background, no floor line, no gradient',
    '- SINGLE image divided into two stacked views of the SAME slipper',
    '- TOP HALF: pure SIDE PROFILE view (camera perfectly level, lateral side of the shoe fully visible head-to-toe, straps and silhouette readable, entire slipper floating slightly above the horizontal mid-line)',
    '- BOTTOM HALF: pure TOP-DOWN view (camera directly above looking straight down, the slipper seen from above showing the FOOTBED from Image 2 and the strap arrangement on top, full outline visible)',
    '- Both views horizontally centered, aligned on the same vertical axis, equal size, subtle contact shadow beneath each',
    '- Space between the two views so they do not overlap',
    '',
    'Branding — CRITICAL:',
    '- Integrate the "BLACK COMBAT" brand logo naturally on the strap, tongue, or upper',
    '- Render it as embossed, debossed, rubberized patch, or subtle tonal print',
    '- Must look like official premium product branding, not a decal or sticker',
    '- If you render it as text, use clean bold sans-serif, legible but discreet',
    '',
    'Style baseline (apply unless user direction above overrides):',
    '- All-black color palette: matte black rubber, black webbing, black EVA foam, black leather, black mesh',
    '- Modern tactical/combat/minimal aesthetic',
    '- Photorealistic commercial product photography, sharp edge-to-edge focus',
    '- Subtle contact shadow under the sole',
    '',
    hint ? 'Reminder: apply the USER DESIGN DIRECTION above (' + hint + ') as the primary stylistic driver.' : '',
    '',
    'Label overlay: at the top-left of the image, include a small clean sans-serif label "BLACK COMBAT SLIPPER CONCEPT" with a 3-digit concept number.',
    '',
    'Constraints: no humans, no extra slippers beyond the hero one, no watermarks other than the concept label and the BLACK COMBAT product branding, no background objects.',
    'Iteration note: this is variant ' + refIndex + ' of ' + totalN + ' — make the silhouette distinctly different from typical slider sandals while keeping all rules above.',
  ]).filter(Boolean).join('\n');
}

async function generateOne(refImage, idx, totalN, hint) {
  var references = [];
  if (FOOTBED_DATA_URL) references.push(FOOTBED_DATA_URL);

  // Vercel 단일 함수 (/api/generate) — Pro 플랜 maxDuration 300s 로 submit+poll+result 전부 서버에서 처리
  var resp = await fetch(apiBase + '/api/generate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      image: refImage,
      referenceImages: references,
      prompt: buildGenerationPrompt(hint, idx, totalN),
      quality: 'low'
    })
  });
  if (!resp.ok) {
    var errText = await resp.text();
    throw new Error(resp.status + ': ' + errText.slice(0, 200));
  }
  var data = await resp.json();
  if (!data.success || !data.imageUrl) throw new Error(data.error || '이미지 없음');
  return data.imageUrl;
}

genBtn.addEventListener('click', async function() {
  if (refImages.length === 0) return;
  genBtn.disabled = true;
  var hint = document.getElementById('genHint').value.trim();
  var total = refImages.length;
  var done = 0;
  var errors = 0;

  // 풋베드 프리로드 대기 (최대 2초)
  for (var w = 0; w < 20 && !FOOTBED_DATA_URL; w++) {
    await new Promise(function(r) { setTimeout(r, 100); });
  }

  genStatus.className = 'gen-status loading';
  genStatus.textContent = '생성 중... (0/' + total + ' · 장당 1~3분)';

  // 드롭한 각 레퍼런스로 1장씩 순차 생성
  for (var i = 0; i < refImages.length; i++) {
    try {
      var img = await generateOne(refImages[i], i + 1, total, hint);
      generatedCount++;
      var newDesign = {
        id: 1000 + 101 + generatedCount,
        name: 'CoA Generated #' + generatedCount,
        img: img,
        cat: 'coa',
        catLabel: 'CoA 디자인',
        source: 'coa',
        generated: true
      };
      generatedDesigns.unshift(newDesign);
      saveGeneratedDesigns();
      activeSection = 'generated';
      activeFilter = 'all';
      renderSections();
      renderFilters();
      renderCards();
      done++;
    } catch (err) {
      errors++;
    }
    genStatus.textContent = '생성 중... (' + (done + errors) + '/' + total + ' · 성공 ' + done + ', 실패 ' + errors + ')';
  }

  genStatus.className = errors > 0 ? 'gen-status error' : 'gen-status success';
  genStatus.textContent = '완료! 성공 ' + done + '장 / 실패 ' + errors + '장';
  setTimeout(function() { genStatus.textContent = ''; }, 4000);
  updateGenBtn();
});

(function initLightbox() {
  var lb = document.getElementById('lightbox');
  var lbImg = document.getElementById('lbImg');
  var lbMeta = document.getElementById('lbMeta');
  var lbYes = document.getElementById('lbYes');
  var lbNo = document.getElementById('lbNo');
  var lbClose = document.getElementById('lbClose');
  var lbPrev = document.getElementById('lbPrev');
  var lbNext = document.getElementById('lbNext');
  var currentId = null;

  function findById(id) {
    var all = generatedDesigns.concat(coaDesigns).concat(designs);
    return all.find(function(d) { return d.id === id; });
  }

  function getVisibleList() {
    return getFiltered(); // 현재 필터 기준 리스트 (좌우 내비 대상)
  }

  function openLb(id) {
    var d = findById(id);
    if (!d) return;
    currentId = id;
    lbImg.src = d.img || '';
    lbImg.alt = d.name || '';
    var sel = getSelections();
    var chosen = sel[id];
    lbMeta.innerHTML = '<span class="lb-num">#' + id + '</span>' +
      '<strong>' + escHtml(d.name) + '</strong>' +
      '<span class="badge badge-' + d.cat + '">' + d.catLabel + '</span>' +
      (d.generated ? '<span class="badge badge-generated">🎨 AI</span>' : '');
    lbYes.classList.toggle('active', chosen === 'yes');
    lbNo.classList.toggle('active', chosen === 'no');
    lb.classList.add('show');
  }

  function closeLb() { lb.classList.remove('show'); currentId = null; }

  function nav(dir) {
    var list = getVisibleList();
    var idx = list.findIndex(function(d) { return d.id === currentId; });
    if (idx < 0) return;
    var next = (idx + dir + list.length) % list.length;
    openLb(list[next].id);
  }

  // 카드 이미지 클릭 OR 돋보기 버튼 클릭 → 모달 (이벤트 위임)
  document.getElementById('grid').addEventListener('click', function(e) {
    var t = e.target;
    // 돋보기 버튼 클릭
    var zoomBtn = t.closest && t.closest('.zoom-btn');
    if (zoomBtn && zoomBtn.dataset.zoomId) {
      e.stopPropagation();
      var zid = parseInt(zoomBtn.dataset.zoomId, 10);
      if (!isNaN(zid)) openLb(zid);
      return;
    }
    // 카드 이미지 탭
    if (t.tagName === 'IMG' && t.dataset.lightboxId) {
      var id = parseInt(t.dataset.lightboxId, 10);
      if (!isNaN(id)) openLb(id);
    }
  });

  lbClose.addEventListener('click', closeLb);
  lb.addEventListener('click', function(e) { if (e.target === lb) closeLb(); }); // 배경 클릭
  lbPrev.addEventListener('click', function() { nav(-1); });
  lbNext.addEventListener('click', function() { nav(1); });

  lbYes.addEventListener('click', function() {
    if (currentId == null) return;
    select(currentId, 'yes');
    var sel = getSelections();
    lbYes.classList.toggle('active', sel[currentId] === 'yes');
    lbNo.classList.toggle('active', sel[currentId] === 'no');
  });
  lbNo.addEventListener('click', function() {
    if (currentId == null) return;
    select(currentId, 'no');
    var sel = getSelections();
    lbYes.classList.toggle('active', sel[currentId] === 'yes');
    lbNo.classList.toggle('active', sel[currentId] === 'no');
  });

  document.addEventListener('keydown', function(e) {
    if (!lb.classList.contains('show')) return;
    if (e.key === 'Escape') closeLb();
    else if (e.key === 'ArrowLeft') nav(-1);
    else if (e.key === 'ArrowRight') nav(1);
    else if (e.key === 'o' || e.key === 'O') lbYes.click();
    else if (e.key === 'x' || e.key === 'X') lbNo.click();
  });
})();
</script>
</body>
</html>
